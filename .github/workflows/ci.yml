name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=lib --cov=nexboot \
            --cov-report=term-missing \
            --cov-fail-under=95

  integration:
    name: Integration test against NexTinyOS example bundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run nexboot against example bundle (dry-run)
        run: |
          python3 nexboot.py \
            --manifest examples/nexos/build-manifest.json \
            --artifacts examples/nexos/ \
            --dry-run --verbose
